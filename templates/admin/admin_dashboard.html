<!DOCTYPE html>
<html>

<head>
<title>Admin Dashboard</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */

body{
min-height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* ADMIN PANEL CARD */

.admin-panel{

background:rgba(255,255,255,0.1);

padding:40px;

border-radius:15px;

backdrop-filter:blur(15px);

box-shadow:0 20px 40px rgba(0,0,0,0.4);

width:420px;

text-align:center;

border:1px solid rgba(255,255,255,0.2);

}

/* TITLE */

h2{
margin-bottom:30px;
}

/* GRID MENU */

.menu{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

}

/* ADMIN CARDS */

.card{

background:rgba(255,255,255,0.15);

padding:20px;

border-radius:10px;

text-decoration:none;

color:white;

font-weight:500;

transition:0.3s;

}

.card:hover{

transform:translateY(-5px);

background:linear-gradient(to right,#00c6ff,#0072ff);

box-shadow:0 8px 20px rgba(0,114,255,0.5);

}

/* LOGOUT BUTTON */

.logout{

margin-top:25px;

display:inline-block;

padding:10px 25px;

background:#ff4b5c;

color:white;

border-radius:6px;

text-decoration:none;

transition:0.3s;

}

.logout:hover{
background:#d93645;
}

</style>

</head>

<body>

<div class="admin-panel">

<h2>⚙ Admin Dashboard</h2>

<div class="menu">

<a class="card" href="/create_election">🗳 Create Election</a>

<a class="card" href="/manage_candidates">👤 Manage Candidates</a>

<a class="card" href="/results">📊 Election Results</a>

</div>

<a class="logout" href="/logout">Logout</a>

</div>

</body>

</html>
