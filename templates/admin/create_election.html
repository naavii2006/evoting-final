<!DOCTYPE html>
<html>

<head>
<title>Create Election</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */

body{
min-height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* FORM CARD */

.form-box{

background:rgba(255,255,255,0.1);

padding:40px;

border-radius:15px;

backdrop-filter:blur(15px);

box-shadow:0 20px 40px rgba(0,0,0,0.4);

width:420px;

border:1px solid rgba(255,255,255,0.2);

}

/* TITLE */

h2{
text-align:center;
margin-bottom:25px;
}

/* LABELS */

label{
font-size:14px;
}

/* INPUTS */

input,
textarea{

width:100%;

padding:10px;

margin-top:6px;

margin-bottom:15px;

border:none;

border-radius:6px;

outline:none;

font-size:14px;

}

/* TEXTAREA */

textarea{
height:80px;
resize:none;
}

/* BUTTON */

button{

width:100%;

padding:12px;

border:none;

border-radius:6px;

background:linear-gradient(to right,#00c6ff,#0072ff);

color:white;

font-size:16px;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:0 8px 20px rgba(0,114,255,0.6);

}

/* NOTE */

.note{
font-size:13px;
color:#ddd;
margin-top:12px;
text-align:center;
}

</style>

</head>

<body>

<div class="form-box">

<h2>🗳 Create Election</h2>

<form method="POST">

<label>Election Title</label>
<input type="text" name="title" required>

<label>Description</label>
<textarea name="description"></textarea>

<label>Candidate Deadline</label>
<input type="date" name="candidate_deadline" required>

<label>Vote Start Date</label>
<input type="date" name="vote_start" required>

<label>Vote End Date</label>
<input type="date" name="vote_end" required>

<button type="submit">Create Election</button>

</form>

<p class="note">Configure the election timeline carefully before publishing.</p>

</div>

</body>

</html>
