<!DOCTYPE html>
<html>

<head>
<title>Available Elections</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
padding:40px;
color:white;
}

/* TITLE */

h2{
text-align:center;
margin-bottom:40px;
}

/* ELECTION CONTAINER */

.container{
max-width:800px;
margin:auto;
}

/* ELECTION CARD */

.election-card{

background:rgba(255,255,255,0.1);

padding:25px;

margin-bottom:25px;

border-radius:12px;

backdrop-filter:blur(15px);

box-shadow:0 15px 30px rgba(0,0,0,0.4);

border:1px solid rgba(255,255,255,0.2);

transition:0.3s;

}

.election-card:hover{

transform:translateY(-5px);

}

/* TITLE */

.election-title{

font-size:20px;

margin-bottom:10px;

}

/* DESCRIPTION */

.description{

font-size:14px;

color:#ddd;

margin-bottom:20px;

}

/* VOTE BUTTON */

.vote-btn{

display:inline-block;

padding:10px 20px;

background:linear-gradient(to right,#00c6ff,#0072ff);

border-radius:6px;

text-decoration:none;

color:white;

font-size:15px;

transition:0.3s;

}

.vote-btn:hover{

transform:scale(1.05);

box-shadow:0 8px 20px rgba(0,114,255,0.6);

}

/* BACK BUTTON */

.back{

display:block;

text-align:center;

margin-top:40px;

color:white;

text-decoration:none;

font-size:14px;

}

.back:hover{
text-decoration:underline;
}

</style>

</head>


<body>

<h2>🗳 Available Elections</h2>

<div class="container">

{% for election in elections %}

<div class="election-card">

<div class="election-title">{{ election["title"] }}</div>

<div class="description">{{ election["description"] }}</div>

<a class="vote-btn" href="/vote/{{ election['id'] }}">Vote</a>

</div>

{% endfor %}

</div>

<a class="back" href="/dashboard">← Back to Dashboard</a>

</body>

</html>
