<!DOCTYPE html>
<html>

<head>
<title>E-Voting Dashboard</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */

body{
min-height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
}

/* DASHBOARD CONTAINER */

.dashboard{

background:rgba(255,255,255,0.1);

padding:40px;

border-radius:15px;

backdrop-filter:blur(15px);

box-shadow:0 20px 40px rgba(0,0,0,0.4);

width:450px;

text-align:center;

border:1px solid rgba(255,255,255,0.2);

}

/* TITLE */

h2{
color:white;
margin-bottom:10px;
}

/* USER NAME */

.username{
color:#ddd;
margin-bottom:30px;
font-size:15px;
}

/* CARD GRID */

.menu{

display:grid;
grid-template-columns:1fr 1fr;
gap:15px;

}

/* DASHBOARD CARDS */

.card{

background:rgba(255,255,255,0.15);

padding:20px;

border-radius:10px;

text-decoration:none;

color:white;

font-weight:500;

transition:0.3s;

}

.card:hover{

transform:translateY(-5px);

background:linear-gradient(to right,#00c6ff,#0072ff);

box-shadow:0 8px 20px rgba(0,114,255,0.5);

}

/* LOGOUT BUTTON */

.logout{

margin-top:25px;

display:inline-block;

padding:10px 25px;

background:#ff4b5c;

color:white;

border-radius:6px;

text-decoration:none;

font-weight:500;

transition:0.3s;

}

.logout:hover{

background:#d93645;

}

</style>

</head>

<body>

<div class="dashboard">

<h2>🗳 E-Voting Dashboard</h2>

<p class="username">Welcome, {{user["name"]}}</p>

<div class="menu">

<a class="card" href="/profile">👤 Profile</a>

<a class="card" href="/elections">🗳 Elections</a>

<a class="card" href="/apply">📄 Apply Candidate</a>

<a class="card" href="/logout">🚪 Logout</a>

</div>

</div>

</body>

</html>
